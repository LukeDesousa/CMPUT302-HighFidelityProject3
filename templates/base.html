{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Vocabulary Explorer{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'site.css' %}">
    {% block extra_head %}{% endblock %}
</head>
<body>
    {% block content %}{% endblock %}
    {% if toast %}
        <div class="toast toast-{{ toast.kind }}" data-toast role="status" aria-live="polite">
            {{ toast.message }}
        </div>
    {% endif %}
    <script src="{% static 'app.js' %}" defer></script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
